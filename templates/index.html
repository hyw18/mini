<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>MBTI 궁합 테스트</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <h1>MBTI 궁합 테스트</h1>

    <form method="post">
        <p>
            내 MBTI:
            <select name="my_mbti">
                {% for mbti in mbti_list %}
                <option value="{{ mbti }}">{{ mbti }}</option>
                {% endfor %}
            </select>
        </p>

        <p>
            <label for="myGender">본인 성별</label>
            <select id="myGender" name="myGender" required>
                <option value="">선택하세요</option>
                <option value="male">남성</option>
                <option value="female">여성</option>
            </select>
        </p>

        <p>
            <label for="partnerGender">상대 성별</label>
            <select id="partnerGender" name="partnerGender">
                <option value="none">없음</option>
                <option value="male">남성</option>
                <option value="female">여성</option>
            </select>
        </p>

        <button type="submit">결과 보기</button>
    </form>

    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}

    {% if result %}
    <hr>

    <h2>결과</h2>
    <p>MBTI: {{ result.my_mbti }}</p>
    <p>가장 잘 맞는 MBTI:
        {% for mbti in result.best_matches %}
            {{ mbti }}{% if not loop.last %}, {% endif %}
        {% endfor %}
    </p>
    {% endif %}

</body>
</html>
